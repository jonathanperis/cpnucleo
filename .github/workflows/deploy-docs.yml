name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  gollum:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Clone wiki
        run: git clone https://github.com/${{ github.repository }}.wiki.git wiki/ || echo "Wiki not found, skipping"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install marked
        run: npm install marked --no-save

      - name: Generate docs
        env:
          DOCS_TITLE: "cpnucleo"
          DOCS_DESCRIPTION: "Project management system built with .NET 10 — Clean Architecture, DDD, and dual REST/gRPC"
          GITHUB_URL: "https://github.com/jonathanperis/cpnucleo"
          LIVE_URL: "https://cpnucleo-webclient-dotnet-d6gve6cabpefbmfz.brazilsouth-01.azurewebsites.net/"
          OUTPUT_PATH: "docs/docs/index.html"
          TEMPLATE_PATH: ".github/docs-template.html"
        run: node .github/generate-docs.js

      - name: Create PR with docs changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="chore/regenerate-docs"
          git checkout -b "$BRANCH"
          git commit -m "chore: regenerate docs from wiki"
          git push origin "$BRANCH" --force
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: regenerate docs from wiki" \
              --body "Auto-generated documentation update from wiki changes."
          else
            echo "PR #$EXISTING_PR already exists — updated via force push"
          fi
