name: Main Release

permissions:
  contents: write
  packages: write
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AOT: false
  TRIM: true
  EXTRA_OPTIMIZE: true
  BUILD_CONFIGURATION: Release

jobs:
  setup-build-test:
    name: Setup, Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: WebApi
          - service: GrpcServer
          - service: IdentityApi
          - service: WebClient

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dependencies
        working-directory: "./src/${{ matrix.service }}"
        run: dotnet restore "${{ matrix.service }}.csproj" -p:Configuration=${${{ env.BUILD_CONFIGURATION }}} -p:AOT=${${{ env.AOT }}} -p:Trim=${${{ env.TRIM }}}

      - name: Build Application
        working-directory: "./src/${{ matrix.service }}"
        run: dotnet build "${{ matrix.service }}.csproj" -c ${{ env.BUILD_CONFIGURATION }} -p:AOT=${${{ env.AOT }}} -p:Trim=${${{ env.TRIM }}} -p:ExtraOptimize=${${{ env.EXTRA_OPTIMIZE }}}

      - name: Architecture Tests
        working-directory: "./test/Architecture.Tests"
        run: dotnet test

  build-push-amd64:
    name: Build & Push amd64 (${{ matrix.service }})
    needs: setup-build-test
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Production
    strategy:
      matrix:
        include:
          - service: WebApi
            dockerfile: ./src/WebApi/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-web-api
          - service: GrpcServer
            dockerfile: ./src/GrpcServer/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-grpc-server
          - service: IdentityApi
            dockerfile: ./src/IdentityApi/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-identity-api
          - service: WebClient
            dockerfile: ./src/WebClient/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-web-client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push amd64 Image
        uses: docker/build-push-action@v7
        with:
          context: ./src/
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:latest
          platforms: linux/amd64
          build-args: |
            AOT=${{ env.AOT }}
            TRIM=${{ env.TRIM }}
            EXTRA_OPTIMIZE=${{ env.EXTRA_OPTIMIZE }}
            BUILD_CONFIGURATION=${{ env.BUILD_CONFIGURATION }}
            ASPNETCORE_ENVIRONMENT=${{ env.ASPNETCORE_ENVIRONMENT }}

  build-push-arm64:
    name: Build & Push arm64 (${{ matrix.service }})
    needs: build-push-amd64
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Production
    strategy:
      matrix:
        include:
          - service: WebApi
            dockerfile: ./src/WebApi/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-web-api
          - service: GrpcServer
            dockerfile: ./src/GrpcServer/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-grpc-server
          - service: IdentityApi
            dockerfile: ./src/IdentityApi/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-identity-api
          - service: WebClient
            dockerfile: ./src/WebClient/Dockerfile
            image: ghcr.io/jonathanperis/cpnucleo-web-client

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push arm64 Image
        uses: docker/build-push-action@v7
        with:
          context: ./src/
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:latest-arm64
          platforms: linux/arm64/v8
          build-args: |
            AOT=${{ env.AOT }}
            TRIM=${{ env.TRIM }}
            EXTRA_OPTIMIZE=${{ env.EXTRA_OPTIMIZE }}
            BUILD_CONFIGURATION=${{ env.BUILD_CONFIGURATION }}
            ASPNETCORE_ENVIRONMENT=${{ env.ASPNETCORE_ENVIRONMENT }}

  container-test:
    name: Container Healthcheck Test (${{ matrix.service }})
    needs: build-push-amd64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: WebApi
            compose_service: webapi1-cpnucleo
            port: 5100
          - service: IdentityApi
            compose_service: identityapi-cpnucleo
            port: 5200
          - service: GrpcServer
            compose_service: grpcserver-cpnucleo
            port: 5301
          - service: WebClient
            compose_service: webclient-cpnucleo
            port: 5400

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Build and Run Docker Compose for Healthcheck Test
        run: |
          docker compose -f compose.prod.yaml up ${{ matrix.compose_service }} -d --no-deps
          sleep 30

      - name: Test Healthcheck Endpoint
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ matrix.port }}/healthz)
            echo "Attempt $i: Status $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "Healthcheck passed with status $STATUS"
              exit 0
            else
              echo "Healthcheck attempt $i failed with status $STATUS. Retrying in 5 seconds..."
              sleep 5
            fi
          done
          echo "Healthcheck failed after 20 attempts."
          exit 1

  deploy-infra:
    name: deploy-infra
    needs: container-test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Login to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep (Incremental)
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: github-jonathanperis
          template: infra/main.bicep
          parameters: infra/main.bicepparam
          deploymentMode: Incremental
          deploymentName: cpnucleo-infra

  merge-manifest:
    name: Merge Multi-arch Manifest (${{ matrix.service }})
    needs: [build-push-amd64, build-push-arm64]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: WebApi
            image: ghcr.io/jonathanperis/cpnucleo-web-api
          - service: GrpcServer
            image: ghcr.io/jonathanperis/cpnucleo-grpc-server
          - service: IdentityApi
            image: ghcr.io/jonathanperis/cpnucleo-identity-api
          - service: WebClient
            image: ghcr.io/jonathanperis/cpnucleo-web-client

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ matrix.image }}:latest \
            ${{ matrix.image }}:latest \
            ${{ matrix.image }}:latest-arm64

  deploy-image:
    name: Deploy to Azure (${{ matrix.service }})
    needs: deploy-infra
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        include:
          - service: WebApi
            app-name: cpnucleo-api-dotnet
            image: ghcr.io/jonathanperis/cpnucleo-web-api:latest
          - service: GrpcServer
            app-name: cpnucleo-grpc-server
            image: ghcr.io/jonathanperis/cpnucleo-grpc-server:latest
          - service: IdentityApi
            app-name: cpnucleo-identity-api
            image: ghcr.io/jonathanperis/cpnucleo-identity-api:latest
          - service: WebClient
            app-name: cpnucleo-webclient-dotnet
            image: ghcr.io/jonathanperis/cpnucleo-web-client:latest

    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app-name }}
          images: ${{ matrix.image }}
