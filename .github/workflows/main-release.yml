name: Main Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AOT: false
  TRIM: true
  EXTRA_OPTIMIZE: true
  BUILD_CONFIGURATION: Release

jobs:
  setup-build-test:
    name: Setup, Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: WebApi
          - service: GrpcServer
          - service: IdentityApi
          - service: WebClient

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore Dependencies
        working-directory: "./src/${{ matrix.service }}"
        run: dotnet restore "${{ matrix.service }}.csproj" -p:Configuration=${${{ env.BUILD_CONFIGURATION }}} -p:AOT=${${{ env.AOT }}} -p:Trim=${${{ env.TRIM }}}

      - name: Build Application
        working-directory: "./src/${{ matrix.service }}"
        run: dotnet build "${{ matrix.service }}.csproj" -c ${{ env.BUILD_CONFIGURATION }} -p:AOT=${${{ env.AOT }}} -p:Trim=${${{ env.TRIM }}} -p:ExtraOptimize=${${{ env.EXTRA_OPTIMIZE }}}

      # - name: Unit Tests
      #   working-directory: "./test/Application.Tests"
      #   run: dotnet test

      - name: Architecture Tests
        working-directory: "./test/Architecture.Tests"
        run: dotnet test

      # - name: Build and Run Docker Compose for Integration Tests
      #   run: |
      #     docker compose up db -d
      #     sleep 30

      # - name: Integration Tests
      #   working-directory: "./test/WebApi.Integration.Tests"
      #   run: dotnet test

  build-push-image:
    name: Build & Push Docker Image (${{ matrix.service }})
    needs: setup-build-test
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Production
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
    strategy:
      matrix:
        include:
          - service: WebApi
            dockerfile: ./src/WebApi/Dockerfile
            image: jonathanperis/cpnucleo-web-api:latest
          - service: GrpcServer
            dockerfile: ./src/GrpcServer/Dockerfile
            image: jonathanperis/cpnucleo-grpc-server:latest
          - service: IdentityApi
            dockerfile: ./src/IdentityApi/Dockerfile
            image: jonathanperis/cpnucleo-identity-api:latest
          - service: WebClient
            dockerfile: ./src/WebClient/Dockerfile
            image: jonathanperis/cpnucleo-web-client:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            AOT=${{ env.AOT }}
            TRIM=${{ env.TRIM }}
            EXTRA_OPTIMIZE=${{ env.EXTRA_OPTIMIZE }}
            BUILD_CONFIGURATION=${{ env.BUILD_CONFIGURATION }}
            ASPNETCORE_ENVIRONMENT=${{ env.ASPNETCORE_ENVIRONMENT }}
            DB_CONNECTION_STRING=${{ env.DB_CONNECTION_STRING }}

  container-test:
    name: Container Healthcheck Test
    needs: build-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Build and Run Docker Compose for Healthcheck Test
        run: |
          docker compose -f compose.prod.yaml up nginx -d
          sleep 30

      - name: Test Healthcheck Endpoint
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/healthz)
            echo "Attempt $i: Status $STATUS"
            if [ "$STATUS" -eq 200 ]; then
              echo "Healthcheck passed with status $STATUS"
              exit 0
            else
              echo "Healthcheck attempt $i failed with status $STATUS. Retrying in 5 seconds..."
              sleep 5
            fi
          done
          echo "Healthcheck failed after 20 attempts."
          exit 1

  deploy:
    name: Deploy to Azure (${{ matrix.service }})
    needs: container-test
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      matrix:
        include:
          - service: WebApi
            environment: production-webapi
            app-name: cpnucleo-api-dotnet
            image: index.docker.io/jonathanperis/cpnucleo-web-api:latest
            publish-profile-secret: AZURE_WEBAPP_PUBLISH_PROFILE_WEBAPI
          - service: GrpcServer
            environment: production-grpcserver
            app-name: cpnucleo-grpc-server
            image: index.docker.io/jonathanperis/cpnucleo-grpc-server:latest
            publish-profile-secret: AZURE_WEBAPP_PUBLISH_PROFILE_GRPCSERVER
          - service: IdentityApi
            environment: production-identityapi
            app-name: cpnucleo-identity-api
            image: index.docker.io/jonathanperis/cpnucleo-identity-api:latest
            publish-profile-secret: AZURE_WEBAPP_PUBLISH_PROFILE_IDENTITYAPI
          - service: WebClient
            environment: production-webclient
            app-name: cpnucleo-webclient-dotnet
            image: index.docker.io/jonathanperis/cpnucleo-web-client:latest
            publish-profile-secret: AZURE_WEBAPP_PUBLISH_PROFILE_WEBCLIENT

    steps:
      - name: Deploy Image to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
            app-name: ${{ matrix.app-name }}
            publish-profile: ${{ secrets[matrix.publish-profile-secret] }}
            images: ${{ matrix.image }}
