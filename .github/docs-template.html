<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - Documentation</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <style>
    :root {
      --bg: #0a0a0a;
      --sidebar-bg: #111111;
      --text-primary: #ededed;
      --text-muted: #888888;
      --text-body: #c8c8c8;
      --accent: #7c6af7;
      --accent-hover: #9b8df9;
      --code-bg: #1e1e2e;
      --code-text: #cdd6f4;
      --border: #1f1f2e;
      --code-border: #2a2a3e;
      --sidebar-width: 260px;
    }

    * { box-sizing: border-box; }
    
    html {
      scroll-behavior: smooth;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 24px 24px 16px;
    }

    .repo-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .repo-title::before {
      content: '';
      display: block;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 4px;
    }

    .repo-description {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 16px;
    }

    .search-box {
      width: 100%;
      background: #000;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus {
      border-color: var(--accent);
    }

    .sidebar-nav-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 24px;
    }

    .sidebar-nav-container ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar-nav-container li {
      margin-bottom: 2px;
    }

    .nav-item {
      display: block;
      padding: 8px 12px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .nav-item:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-item.active {
      color: var(--accent);
      background: rgba(124, 106, 247, 0.1);
      font-weight: 500;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    .sidebar-footer a {
      color: var(--text-muted);
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
    }

    .sidebar-footer a:hover {
      color: var(--text-primary);
    }

    /* Main Content */
    .content-wrapper {
      margin-left: var(--sidebar-width);
      flex: 1;
      display: flex;
      justify-content: center;
      width: calc(100% - var(--sidebar-width));
    }

    .content {
      width: 100%;
      max-width: 860px;
      padding: 48px 64px;
    }

    /* Typography */
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      color: var(--text-primary);
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 48px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
    }

    h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 32px 0 12px;
      color: var(--text-primary);
    }

    p {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text-body);
      margin: 0 0 16px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Code */
    pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 24px 0;
      position: relative;
    }
    
    pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: var(--code-text);
      font-size: 13px;
    }

    code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 13px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 8px;
      overflow: hidden;
      margin: 24px 0;
      font-size: 14px;
      border: 1px solid var(--border);
    }

    th, td {
      padding: 10px 16px;
      text-align: left;
    }

    th {
      background: #1a1a2e;
      color: var(--text-primary);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    td {
      border-bottom: 1px solid var(--border);
      color: var(--text-body);
    }

    tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.02);
    }
    
    tr:last-child td {
      border-bottom: none;
    }

    /* Blockquotes */
    blockquote {
      margin: 24px 0;
      padding: 12px 20px;
      background: var(--sidebar-bg);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
    }

    blockquote p {
      margin: 0;
    }

    /* HR */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    /* Sections */
    section.doc-section {
      scroll-margin-top: 80px;
      margin-bottom: 80px;
    }
    
    .hidden-section {
      display: none;
    }
    
    .search-highlight {
      background: rgba(124, 106, 247, 0.3);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* Mobile */
    .mobile-header {
      display: none;
      position: sticky;
      top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      z-index: 90;
      align-items: center;
      gap: 16px;
    }

    .menu-toggle {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .menu-toggle span {
      display: block;
      width: 20px;
      height: 2px;
      background: currentColor;
      border-radius: 2px;
    }
    
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      z-index: 95;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .content-wrapper {
        margin-left: 0;
        width: 100%;
      }
      .content {
        padding: 32px 24px;
      }
      .mobile-header {
        display: flex;
      }
      .overlay.open {
        display: block;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Mobile Header -->
  <div class="mobile-header">
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="repo-title">{{TITLE}}</div>
  </div>

  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="repo-title">{{TITLE}}</h1>
      <p class="repo-description">{{DESCRIPTION}}</p>
      <input type="text" id="searchInput" class="search-box" placeholder="Search documentation...">
    </div>
    <div class="sidebar-nav-container">
      {{SIDEBAR_NAV}}
    </div>
    <div class="sidebar-footer">
      <a href="{{GITHUB_URL}}" target="_blank" rel="noopener noreferrer">View on GitHub</a>
      <div>Built by Jonathan Peris</div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="content-wrapper">
    <main class="content" id="mainContent">
      {{MAIN_CONTENT}}
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Mobile menu toggle
      const menuToggle = document.getElementById('menuToggle');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');

      function toggleMenu() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
      }

      if(menuToggle) menuToggle.addEventListener('click', toggleMenu);
      if(overlay) overlay.addEventListener('click', toggleMenu);

      // Scrollspy
      const sections = document.querySelectorAll('section.doc-section');
      const navItems = document.querySelectorAll('.nav-item');
      
      const observerOptions = {
        root: null,
        rootMargin: '-80px 0px -60% 0px',
        threshold: 0
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            navItems.forEach(item => {
              item.classList.remove('active');
              if (item.getAttribute('href') === `#${entry.target.id}`) {
                item.classList.add('active');
                // Scroll sidebar if needed
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }
            });
          }
        });
      }, observerOptions);

      sections.forEach(section => observer.observe(section));

      // Click on nav items (mobile close)
      navItems.forEach(item => {
        item.addEventListener('click', () => {
          if (window.innerWidth <= 768) {
            toggleMenu();
          }
        });
      });

      // Search
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          const query = e.target.value.toLowerCase();
          
          sections.forEach(section => {
            const text = section.textContent.toLowerCase();
            const navItem = document.querySelector(`.nav-item[href="#${section.id}"]`);
            const li = navItem ? navItem.parentElement : null;
            
            if (text.includes(query) || query === '') {
              section.classList.remove('hidden-section');
              if(li) li.style.display = '';
            } else {
              section.classList.add('hidden-section');
              if(li) li.style.display = 'none';
            }
          });
        });
      }
    });
  </script>
</body>
</html>
